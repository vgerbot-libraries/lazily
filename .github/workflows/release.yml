name: Release

on:
  push:
    tags:
      - 'v*'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Version packages with Changesets
        run: pnpm run version

      - name: Commit and merge version changes back to main
        run: |
          if git diff --quiet; then
            echo "No version changes generated by changesets."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCH="release/${GITHUB_REF_NAME}"
          git switch -c "$RELEASE_BRANCH"
          git add -A
          git commit -m "chore: version packages for ${GITHUB_REF_NAME}"

          git fetch origin main
          git switch main
          git merge --ff-only "$RELEASE_BRANCH"
          git push origin main

      - name: Publish to npm
        run: pnpm release

      - name: Generate TypeDoc documentation
        run: pnpm typedoc

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

